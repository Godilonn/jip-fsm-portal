services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jip_fsm_db}
      POSTGRES_USER: ${POSTGRES_USER:-jip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jip_user} -d ${POSTGRES_DB:-jip_fsm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jip_network

  # ── App ───────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jip_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-jip_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jip_fsm_db}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - jip_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  uploads_data:

networks:
  jip_network:
    driver: bridge
